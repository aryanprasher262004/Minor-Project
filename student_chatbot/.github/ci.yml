# .github/workflows/ci.yml
# Runs on every push and pull request
# Jobs: lint → build → docker build test

name: CI — Build & Test

on:
  push:
    branches: [main, devops, devops-monitoring]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # JOB 1: Install & Build Check
  # ─────────────────────────────────────
  build:
    name: 🔨 Install & Build
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Create a dummy .env.local so build doesn't fail
      # Real values injected from GitHub Secrets
      - name: Create environment file
        run: |
          echo "DIALOGFLOW_PROJECT_ID=${{ secrets.DIALOGFLOW_PROJECT_ID }}" >> .env.local
          echo "DIALOGFLOW_CLIENT_EMAIL=${{ secrets.DIALOGFLOW_CLIENT_EMAIL }}" >> .env.local
          echo "DIALOGFLOW_PRIVATE_KEY=${{ secrets.DIALOGFLOW_PRIVATE_KEY }}" >> .env.local

      # Step 5: Build Next.js
      - name: Build Next.js app
        run: npm run build

      # Step 6: Upload build artifact (used by docker job)
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────
  # JOB 2: Docker Build Test
  # ─────────────────────────────────────
  docker:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: build  # only runs if build job passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          echo "DIALOGFLOW_PROJECT_ID=${{ secrets.DIALOGFLOW_PROJECT_ID }}" >> .env.local
          echo "DIALOGFLOW_CLIENT_EMAIL=${{ secrets.DIALOGFLOW_CLIENT_EMAIL }}" >> .env.local
          echo "DIALOGFLOW_PRIVATE_KEY=${{ secrets.DIALOGFLOW_PRIVATE_KEY }}" >> .env.local

      # Setup Docker Buildx for better builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Test that Docker image builds successfully
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # just test build, don't push yet
          tags: campusx-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max